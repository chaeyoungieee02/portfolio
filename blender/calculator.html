<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blender | Earth Age Calculator</title>
  <link rel="stylesheet" href="../styles.css?v=202" />
</head>
<body>
  <div class="bg-stars"></div>
  <header class="site-header"><div class="container nav-wrap"><a class="brand" href="../index.html"><span class="brand-icon">i</span><span class="brand-text">PORTFOLIO SPACE</span></a></div></header>
  <main class="container page-wrap">
    <h1>Earth Age Calculator</h1>
    <section class="f-card">
      <label for="age">Enter your age on Earth</label>
      <input id="age" type="number" min="0" placeholder="e.g. 18" />
      <button id="calcBtn" class="pill-btn ghost" type="button">Calculate</button>
      <pre id="result" class="result-box">Your planetary ages will appear here.</pre>
    </section>
  </main>
  <script src="../script.js?v=202"></script>
</body>
</html>
